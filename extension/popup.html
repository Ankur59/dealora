<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dealora AI Agent Admin</title>
    <link rel="stylesheet" href="popup.css" />
    <style>
        body { width: 340px; font-family: 'Inter', sans-serif; margin: 0; background: #f9fafb; }
        .header { background: #111827; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .main { padding: 15px; }
        .step { display: none; }
        .step.active { display: block; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-outline { background: white; color: #374151; border: 1px solid #d1d5db; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 12px; color: #4b5563; }
        .input-group input, .input-group select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 4px; }
        
        .merchant-item { background: white; border: 1px solid #e5e7eb; padding: 10px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .merchant-name { font-weight: 600; font-size: 14px; }
        .merchant-status { font-size: 12px; color: #ef4444; }
        .merchant-status.logged-in { color: #10b981; }
        .btn-open { background: #f3f4f6; color: #111827; padding: 5px 10px; font-size: 12px; border-radius: 4px; text-decoration: none; border: 1px solid #d1d5db; }
        
        .queue-stats { background: white; padding: 15px; border-radius: 6px; border: 1px solid #e5e7eb; margin-bottom: 15px; text-align: center; }
        .queue-stats h3 { margin: 0 0 5px 0; font-size: 24px; color: #3b82f6; }
        .queue-stats p { margin: 0; font-size: 12px; color: #6b7280; }

        .tabs { display: flex; border-bottom: 1px solid #e5e7eb; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; cursor: pointer; font-weight: 600; color: #6b7280; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .small-text { font-size: 11px; color: #6b7280; }
    </style>
</head>
<body>

    <header class="header">
        <span class="logo-text">Dealora AI Agent</span>
        <div id="statusDot" style="width: 10px; height: 10px; border-radius: 50%; background: #ef4444;"></div>
    </header>

    <main class="main">
        <!-- Step 1: Login -->
        <section id="stepLogin" class="step active">
            <div class="input-group">
                <label>Admin Username</label>
                <input type="text" id="username" placeholder="admin" />
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" />
            </div>
            <button id="btnLogin" class="btn btn-primary">Login to Dealora</button>
        </section>

        <!-- Step 2: Dashboard -->
        <section id="stepDashboard" class="step">
            <div class="tabs">
                <button class="tab-btn active" data-tab="agentTab">AI Agent</button>
                <button class="tab-btn" data-tab="adminTab">Admin</button>
            </div>

            <!-- Agent Tab Content -->
            <div id="agentTab" class="tab-content active">
                <div class="queue-stats">
                    <h3 id="activeTasks">0</h3>
                    <p>Parallel Verifications Running</p>
                </div>
                
                <div id="otpContainer" style="display: none; background: #fee2e2; padding: 15px; border-radius: 6px; border: 1px solid #ef4444; margin-bottom: 15px;">
                    <h4 style="margin: 0 0 5px 0; color: #b91c1c; font-size: 14px;">Action Required</h4>
                    <p id="otpMessage" style="font-size: 12px; margin: 0 0 10px 0; color: #7f1d1d;">Enter the verification code to continue.</p>
                    <div class="input-group">
                        <input type="text" id="otpInput" placeholder="Enter OTP" style="margin-bottom: 5px;" />
                    </div>
                    <button id="btnSubmitOtp" class="btn btn-danger" style="padding: 6px;">Submit OTP</button>
                </div>
                
                <button id="btnToggleAgent" class="btn btn-success">Start AI Agent</button>

                <h4 style="margin-top: 20px; font-size: 14px; color: #374151;">Merchant Sessions</h4>
                <div id="merchantList">
                    <p class="small-text">Loading merchants from DB...</p>
                </div>
            </div>

            <!-- Admin Tab Content -->
            <div id="adminTab" class="tab-content">
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <button class="btn btn-outline active" id="btnAdminCampaigns" style="flex: 1; border-color: #3b82f6; color: #3b82f6;">Campaigns</button>
                    <button class="btn btn-outline" id="btnAdminPartners" style="flex: 1;">Partners</button>
                </div>

                <div id="adminCampaignSection" class="admin-section">
                    <h4 style="margin: 0 0 10px 0; font-size: 14px; color: #374151;">Add Campaign (Merchant)</h4>
                    <div style="background: white; padding: 12px; border-radius: 6px; border: 1px solid #e5e7eb; margin-bottom: 20px;">
                        <div class="input-group">
                            <label>Partner Network</label>
                            <select id="newMerchantPartner">
                                <option value="">Select Partner...</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Merchant / Campaign Name</label>
                            <input type="text" id="newMerchantName" placeholder="e.g. Amazon India" />
                        </div>
                        <div class="input-group">
                            <label>Domain</label>
                            <input type="text" id="newMerchantDomain" placeholder="e.g. amazon.in" />
                        </div>
                        <div class="input-group">
                            <label>Login URL</label>
                            <input type="text" id="newMerchantUrl" placeholder="e.g. https://www.amazon.in/login" />
                        </div>
                        <button id="btnAddMerchant" class="btn btn-primary" style="padding: 8px; margin-top: 5px;">Save Campaign</button>
                    </div>
                    
                    <h4 style="margin: 0 0 10px 0; font-size: 14px; color: #374151;">Database Campaigns</h4>
                    <div id="dbMerchantList">
                        <p class="small-text">Loading...</p>
                    </div>
                </div>

                <div id="adminPartnerSection" class="admin-section" style="display: none;">
                    <h4 style="margin: 0 0 10px 0; font-size: 14px; color: #374151;">Add New Partner</h4>
                    <div style="background: white; padding: 12px; border-radius: 6px; border: 1px solid #e5e7eb; margin-bottom: 20px;">
                        <div class="input-group">
                            <label>Partner Name</label>
                            <input type="text" id="newPartnerName" placeholder="e.g. Impact, CJ" />
                        </div>
                        <div class="input-group">
                            <label>Status</label>
                            <select id="newPartnerStatus">
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                            </select>
                        </div>
                        <button id="btnAddPartner" class="btn btn-primary" style="padding: 8px; margin-top: 5px;">Save Partner</button>
                    </div>
                    
                    <h4 style="margin: 0 0 10px 0; font-size: 14px; color: #374151;">Configured Partners</h4>
                    <div id="dbPartnerList">
                        <p class="small-text">Loading...</p>
                    </div>
                </div>
            </div>
            
            <button id="btnLogout" class="btn btn-outline" style="margin-top: 20px;">Logout</button>
        </section>
    </main>

    <script type="module" src="popup.js"></script>
</body>
</html>
